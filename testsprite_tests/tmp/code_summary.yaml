version: "2"
type: backend
tech_stack:
  - Go 1.26
  - Echo v5 (labstack/echo/v5)
  - PostgreSQL (pgx/v5)
  - golang-migrate
  - sqlc
  - JWT (golang-jwt/jwt/v5)
  - WebP/image processing (chai2010/webp)

features:
  - name: Health Check
    description: Basic health check endpoint
    files:
      - internal/admin/server.go
    endpoints:
      - method: GET
        path: /health
        description: Health check
        auth_required: false
        response_schema:
          "200": '{"status": "ok"}'
    depends_on: []

  - name: Authentication
    description: User registration and login with JWT tokens
    files:
      - internal/handler/auth.go
      - internal/admin/server.go
    endpoints:
      - method: POST
        path: /api/auth/register
        description: Register new user
        auth_required: false
        request_schema:
          body:
            email: string
            password: string (min 8 chars)
        response_schema:
          "201": '{"token": "jwt...", "user": {"id": 1, "email": "..."}}'
          "400": Email or password empty, password < 8 chars
          "409": Email already exists
      - method: POST
        path: /api/auth/login
        description: Login user
        auth_required: false
        request_schema:
          body:
            email: string
            password: string
        response_schema:
          "200": '{"token": "jwt...", "user": {"id": 1, "email": "..."}}'
          "400": Email or password empty
          "401": Invalid credentials
      - method: GET
        path: /api/me
        description: Get current authenticated user
        auth_required: true
        response_schema:
          "200": '{"id": 1, "email": "..."}'
          "401": Token missing, invalid or expired
    depends_on: []

  - name: Sites Management
    description: CRUD operations for sites with locales, layout options, and live status
    files:
      - internal/handler/site.go
      - internal/admin/server.go
    endpoints:
      - method: POST
        path: /api/sites
        description: Create site with default pages and locales
        auth_required: true
        request_schema:
          body:
            name: string (required)
            domain: string (required, unique)
            options: object (default {})
            locales: array (required, min 1 item with code and is_default)
        response_schema:
          "201": Site with locales and auto-created pages
          "400": Invalid body, empty name/domain, empty locales, duplicate locale codes
          "409": Domain already exists
      - method: GET
        path: /api/sites
        description: List sites (paginated, filterable)
        auth_required: true
        request_schema:
          query:
            cursor: int64 (optional)
            limit: int32 (optional, max 100)
            filter[name]: string (optional)
            filter[domain]: string (optional)
            filter[id]: int64 (optional)
        response_schema:
          "200": Paginated list of sites with locales
      - method: GET
        path: /api/sites/:id
        description: Get site with locale-resolved options
        auth_required: true
        request_schema:
          query:
            locale: string (optional, defaults to site default locale)
        response_schema:
          "200": Site with resolved options and routes
          "404": Site not found
      - method: PUT
        path: /api/sites/:id
        description: Update site (locale required for layout merge)
        auth_required: true
        request_schema:
          query:
            locale: string (required)
          body:
            name: string
            domain: string
            options: object
        response_schema:
          "200": Updated site
          "409": Domain already exists on another site
      - method: PUT
        path: /api/sites/:id/live
        description: Set site as live (deactivates previous live site, regenerates pages)
        auth_required: true
        response_schema:
          "200": Site object
          "404": Site not found
      - method: DELETE
        path: /api/sites/:id
        description: Delete site and all related data (cascade)
        auth_required: true
        response_schema:
          "204": No content
          "404": Site not found
    depends_on:
      - Authentication

  - name: Site Locales
    description: Manage locales (languages) for a site
    files:
      - internal/handler/site.go
      - internal/admin/server.go
    endpoints:
      - method: POST
        path: /api/sites/:id/locales
        description: Add locale to site
        auth_required: true
        request_schema:
          body:
            code: string (required, ISO 639-1)
            is_default: boolean (default false)
        response_schema:
          "201": '{"code": "ca", "is_default": false}'
          "409": Duplicate locale code
      - method: DELETE
        path: /api/sites/:id/locales/:localeCode
        description: Remove locale from site (cascade deletes related data)
        auth_required: true
        response_schema:
          "204": No content
          "404": Site or locale not found
    depends_on:
      - Authentication
      - Sites Management

  - name: Pages Management
    description: CRUD for pages and posts within a site with layout, SEO, slugs, and revisions
    files:
      - internal/handler/page.go
      - internal/admin/server.go
    endpoints:
      - method: POST
        path: /api/sites/:id/pages
        description: Create page or post with layout, SEO, and slugs
        auth_required: true
        request_schema:
          query:
            locale: string (required)
          body:
            type: string (page or post, required)
            blog_id: int64 (required for posts)
            parent_id: int64 (optional)
            layout: object (optional, auto-generates 4 sections if empty)
            published_at: string (optional, ISO 8601)
            seo: array (optional)
            slugs: array (required, min 1)
        response_schema:
          "201": Created page with resolved layout
          "400": Invalid type, missing slugs, locale mismatch
      - method: GET
        path: /api/sites/:id/pages
        description: List pages (paginated, filterable by type, parent_id, blog_id, published_at)
        auth_required: true
        request_schema:
          query:
            cursor: int64
            limit: int32
            filter[type]: string
            filter[parent_id]: int64
            filter[blog_id]: int64
            filter[published_at_isnull]: boolean
        response_schema:
          "200": Paginated list of pages
      - method: GET
        path: /api/sites/:id/pages/:pageId
        description: Get page with locale-resolved layout
        auth_required: true
        request_schema:
          query:
            locale: string (required)
        response_schema:
          "200": Page with resolved layout
          "404": Page not found
      - method: PUT
        path: /api/sites/:id/pages/:pageId
        description: Update page layout, SEO, slugs (locale merge)
        auth_required: true
        request_schema:
          query:
            locale: string (required)
          body:
            parent_id: int64
            layout: object
            published_at: string
            seo: array
            slugs: array (required)
        response_schema:
          "200": Updated page
      - method: DELETE
        path: /api/sites/:id/pages/:pageId
        description: Delete page and all children (cascade)
        auth_required: true
        response_schema:
          "204": No content
      - method: GET
        path: /api/sites/:id/pages/:pageId/revisions
        description: List page revisions (paginated)
        auth_required: true
        response_schema:
          "200": Paginated list of revisions
      - method: POST
        path: /api/sites/:id/pages/:pageId/revisions/:revisionId/restore
        description: Restore a page revision
        auth_required: true
        request_schema:
          query:
            locale: string (required)
        response_schema:
          "200": Page with restored layout
      - method: GET
        path: /api/sites/:id/routes
        description: Get all routes for vue-router
        auth_required: true
        response_schema:
          "200": Routes map by locale
      - method: POST
        path: /api/sites/:id/sections/next-id
        description: Get next unique section ID for site
        auth_required: true
        response_schema:
          "200": '{"id": 5}'
      - method: POST
        path: /api/sites/:id/blocks/next-id
        description: Get next unique block ID for site
        auth_required: true
        response_schema:
          "200": '{"id": 5}'
    depends_on:
      - Authentication
      - Sites Management

  - name: Media Management
    description: Upload, list, get, delete media files with auto thumbnail generation
    files:
      - internal/handler/media.go
      - internal/admin/server.go
    endpoints:
      - method: POST
        path: /api/media
        description: Upload media file (jpeg, png, gif, webp, svg)
        auth_required: true
        request_schema:
          body: multipart/form-data with file field
        response_schema:
          "201": Media object with url and thumbnail_url
          "400": No file or invalid MIME type
      - method: GET
        path: /api/media
        description: List media (paginated, filterable by id, filename, mime_type)
        auth_required: true
        request_schema:
          query:
            cursor: int64
            limit: int32
            filter[id]: int64
            filter[filename]: string
            filter[mime_type]: string
        response_schema:
          "200": Paginated list of media
      - method: GET
        path: /api/media/:id
        description: Get media metadata by ID
        auth_required: true
        response_schema:
          "200": Media object
          "404": Media not found
      - method: DELETE
        path: /api/media/:id
        description: Delete media and files from disk
        auth_required: true
        response_schema:
          "204": No content
          "404": Media not found
      - method: GET
        path: /media/:name
        description: Serve media file (public, no auth required)
        auth_required: false
        response_schema:
          "200": Binary file
          "404": File not found
    depends_on:
      - Authentication

known_limitations: []
